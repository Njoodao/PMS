# Render Blueprint — deploys the FastAPI proxy (web service) + the static app.
# Import via Render → New → Blueprint. Set the secret env vars in the dashboard
# (they are marked sync:false so they are NOT read from the repo).
services:
  # ── Backend: KABi Integration Proxy (FastAPI) ──────────────────────────────
  - type: web
    name: kabi-proxy
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS      # set to your deployed frontend origin(s)
        sync: false
      - key: MOONSHOT_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JIRA_BASE_URL
        sync: false
      - key: JIRA_EMAIL
        sync: false
      - key: JIRA_API_TOKEN
        sync: false
      - key: PIPEDRIVE_API_TOKEN
        sync: false
      - key: KABI_ROSTER_PATH     # path to the uploaded org roster (P3 governance)
        sync: false

  # ── Frontend: the single-file app (static, no build) ───────────────────────
  # Serves index.html + the 06/07/09/10/11 JS files from the repo root as-is.
  - type: web
    name: kabi-app
    runtime: static
    buildCommand: ""
    staticPublishPath: .
